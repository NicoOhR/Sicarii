<!-- post.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Baskervville:ital@0;1&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Fira+Code:wght@300..700&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Wittgenstein:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../tufte.css">
  <link rel="stylesheet" href="../code_highlight.css">
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
</head>
<body>
  <style>
  :not(pre) > code {
      background: #313244;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-family: 'Fira Code', monospace;
      font-variant-ligatures: contextual;
      font-feature-settings: "calt" 1, "liga" 1;
      font-size: 0.875em;
  }
  .code-block {
      margin: 1.5em 0;
      border: 1px solid #45475a;
      border-radius: 6px;
      overflow: hidden;
  }
  .code-block::before {
      content: attr(data-lang);
      display: block;
      background: #800000;
      color: #ffffff;
      font-family: 'Fira Code', monospace;
      font-variant-ligatures: contextual;
      font-feature-settings: "calt" 1, "liga" 1;
      font-size: 0.72em;
      padding: 0.35em 1em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
  }
  .code-block[data-lang="text"]::before,
  .code-block[data-lang="plaintext"]::before {
      display: none;
  }
  pre.code {
      font-family: 'Fira Code', monospace;
      font-variant-ligatures: contextual;
      font-feature-settings: "calt" 1, "liga" 1;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: pre;
      padding: 0.75em 1em;
      margin: 0;
      border-radius: 0;
      -webkit-overflow-scrolling: touch;
  }
  .post-content table {
      border-collapse: collapse;
      width: 55%;
      margin: 1.5em auto;
      font-size: 0.9em;
  }
  .post-content thead {
      background: #313244;
      border-bottom: 2px solid #800000;
  }
  .post-content th,
  .post-content td {
      padding: 0.5em 0.85em;
      text-align: left;
      border: 1px solid #45475a;
  }
  .post-content th {
      font-weight: 600;
      letter-spacing: 0.03em;
  }
  .post-content tbody tr:nth-child(even) {
      background: #1e1e2e;
  }
  .post-content tbody tr:hover {
      background: #313244;
  }
  .divider-link {
      position: relative;
      display: inline-block;
  }
  .divider-link::after {
      content: "";
      position: absolute;
      bottom: -0.35rem;
      left: -20%;
      width: 140%;
      height: 1px;
      background-color: #ffffff;
      transition: background-color 300ms ease-in-out;
  }
  .divider-link:hover::after {
      background-color: #800000;
  }
  </style>
  <nav class="nav editorial-nav">
    <div class="nav-center">
      <a href="../" class="nav-title divider-link">Sicarii</a>
    </div>
  </nav>

  <div class="editorial">
    <main class="post-container">
      <div class="post-header">
        <h1 class="post-title">{{ title }}</h1>
        <div class="post-meta">
          <div class="author">{{ author }}</div>
          <div class="date">{{ date }}</div>
        </div>
      </div>

      <article class="post-content">
        {{ content|safe }}
      </article>
    </main>
  </div>
  <script>
    // pulldown-cmark emits <span class="math math-inline"> and
    // <span class="math math-display"> with raw LaTeX but no delimiters.
    // Inject \(...\) / \[...\] before MathJax scans the document.
    window.MathJax = {
      loader: {load: ['[tex]/ams']},
      tex: {
        packages: {'[+]':['ams']},
        inlineMath: [ ['\\(', '\\)'] ],
        displayMath: [ ['\\[', '\\]'] ],
      },
      startup: {
        ready() {
          document.querySelectorAll('span.math.math-inline').forEach(el => {
            el.textContent = '\\(' + el.textContent + '\\)';
          });
          document.querySelectorAll('span.math.math-display').forEach(el => {
            el.textContent = '\\[' + el.textContent + '\\]';
          });
          MathJax.startup.defaultReady();
        }
      }
    };
  </script>
<script id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>

</body>
</html>
